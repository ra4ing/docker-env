name: docker images cicd
# 触发器设置
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  repository_dispatch:
    types: [ dotfile-updated ]

# 项目任务，任务之间可以并行调度
jobs:
  build:
    # 选择云端运行的环境
    runs-on: ubuntu-latest
    steps:
      # uses代表使用一个模块，此处使用的是checkout模块，将github项目文件导入到当前环境中
      - uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker images
        run: |
          echo "Starting build process..."
          # 检查当前目录
          echo "Current directory content:"
          ls -l

          # 定义重试函数
          retry_command() {
            local cmd=$1
            local retries=5
            local count=0
            local delay=5  # 每次重试的延迟时间（秒）
            until $cmd; do
              ((count++))
              if [ $count -ge $retries ]; then
                echo "Command failed after $retries attempts"
                return 1
              fi
              echo "Command failed, retrying in $delay seconds..."
              sleep $delay
            done
            return 0
          }

          # 遍历所有类型目录，例如 pwn
          for type_dir in */; do
            echo "Processing directory: $type_dir"
            # 获取类型名称，移除末尾的 '/'
            type_name="${type_dir%/}"
            # 遍历类型目录下的所有子目录，例如 pwn_ubuntu_xx
            for dir in "$type_name"/*; do
              echo "Found directory: $dir"
              if [ -d "$dir" ]; then
                # 获取目录名称，例如 pwn_ubuntu_xx
                dir_name=$(basename "$dir")

                # 构建 Docker 镜像，并重试
                echo "Building Docker image in directory: $dir"
                retry_command "docker build -t ${{ secrets.DOCKER_USERNAME }}/$type_name:$dir_name $dir"
                if [ $? -ne 0 ]; then
                  echo "Failed to build image for $dir_name"
                  continue
                fi

                # 推送 Docker 镜像，并重试
                echo "Pushing Docker image for $dir_name"
                retry_command "docker push ${{ secrets.DOCKER_USERNAME }}/$type_name:$dir_name"
                if [ $? -ne 0 ]; then
                  echo "Failed to push image for $dir_name"
                  continue
                fi
              fi
            done
          done
